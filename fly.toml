# fly.toml app configuration file generated for remon-bot on 2026-05-13T00:25:17+06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'remon-bot'
primary_region = 'sin'

[build]

[env]
  POLL_INTERVAL_MINUTES = '5'

[[mounts]]
  source = 'remon_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[services]]
  protocol = 'tcp'
  internal_port = 8080

  [[services.ports]]
    port = 80

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
